[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
# Watch patterns for automatic rebuilds
watchPatterns = ["backend/app/**", "requirements.txt", "Dockerfile"]

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
healthcheckPath = "/health"
# Hobby plan can handle longer startup times for model loading
healthcheckTimeout = 120
# Let Dockerfile CMD handle the start command
