[build]
builder = "NIXPACKS"
buildCommand = "echo 'Build complete - model will download at startup'"

[deploy]
startCommand = "cd backend/app && python -m uvicorn api_server:app --host 0.0.0.0 --port $PORT"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
healthcheckPath = "/health"
healthcheckTimeout = 300
